<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>極・ULTRA ENGINE Pro</title>
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html, body { overflow-x: hidden; }

        .glass {
            @apply bg-white/90 dark:bg-slate-900/90 border border-slate-200 dark:border-slate-800 shadow-xl;
        }

        input, select {
            @apply bg-slate-100 dark:bg-slate-800 px-3 py-2 rounded-xl text-sm outline-none focus:ring-1 ring-blue-500;
        }

        .step-btn { @apply px-3 py-1 bg-slate-200 dark:bg-slate-700 rounded-lg font-bold; }

        ::-webkit-scrollbar { display:none; }
    </style>
</head>

<body class="bg-slate-50 dark:bg-slate-950 dark:text-slate-200 p-3 pb-24">

<div class="max-w-md mx-auto space-y-3">

    <!-- Header -->
    <header class="flex justify-between items-center py-1">
        <div class="flex items-center gap-3">
            <h1 class="text-xl font-black italic text-blue-600">Ultra Engine Pro</h1>
            <button onclick="toggleDarkMode()" class="text-xl">🌗</button>
        </div>
        <div class="flex gap-2">
            <button onclick="resetSettings()" class="bg-rose-200 text-rose-700 px-4 py-2 rounded-full text-[10px] font-bold">Reset</button>
            <button onclick="copyAll()" class="bg-slate-300 px-4 py-2 rounded-full text-[10px] font-bold">Copy</button>
        </div>
    </header>

    <!-- 基本入力 -->
    <div class="glass rounded-2xl p-4 space-y-4">

        <input id="sw" placeholder="開始単語（空なら自由）" class="w-full">

        <div class="grid grid-cols-3 gap-2">
            <input id="sc" placeholder="開始字">
            <input id="mc" placeholder="必須文字（ア,イ:2,ウ=1）">
            <input id="ec" placeholder="終了字">
        </div>

        <!-- 詳細設定 -->
        <details class="border rounded-2xl p-2 bg-slate-50/50 dark:bg-slate-800/20">
            <summary class="text-center py-2 text-[11px] font-bold text-blue-600 cursor-pointer">＋ 詳細設定</summary>

            <div class="space-y-4 pt-1 pb-2">

                <!-- 全語開始/終了 -->
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-[10px] font-bold text-blue-500 ml-1">全語開始字</label>
                        <input id="asc" class="w-20">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-blue-500 ml-1">全語終了字</label>
                        <input id="aec" class="w-20">
                    </div>
                </div>

                <!-- valid / exclude / ban -->
                <div>
                    <label class="text-[10px] font-bold text-emerald-500 ml-1">使える文字</label>
                    <input id="valid_chars" class="w-32">
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-[10px] font-bold text-slate-300 dark:text-slate-200 ml-1">使用不可</label>
                        <input id="exc" class="w-20">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-rose-500 ml-1">禁止開始</label>
                        <input id="bsc" class="w-20">
                    </div>
                </div>

                <!-- 合計文字数 -->
                <div>
                    <label class="text-[10px] font-bold text-slate-300 dark:text-slate-200 ml-1">合計文字数</label>
                    <div class="flex gap-2">
                        <button onclick="stepValue('ttl',-1)" class="step-btn">-</button>
                        <input id="ttl" type="number" class="w-14 text-center">
                        <button onclick="stepValue('ttl',1)" class="step-btn">+</button>
                    </div>
                </div>

                <!-- len_mode / sort -->
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-[10px] font-bold text-emerald-500 ml-1">文字数構成</label>
                        <select id="len_mode" class="w-full text-[11px] font-bold">
                            <option value="free">自由</option>
                            <option value="same">同じ</option>
                            <option value="diff">バラバラ</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-300 dark:text-slate-200 ml-1">ソート</label>
                        <select id="sort_mode" class="w-full text-[11px] font-bold">
                            <option value="default">そのまま</option>
                            <option value="kana">50音順</option>
                            <option value="len_asc">短い順</option>
                            <option value="len_desc">長い順</option>
                            <option value="random">ランダム</option>
                        </select>
                    </div>
                </div>

                <!-- ずらし -->
                <div class="glass rounded-xl p-3 space-y-3">
                    <label class="text-[11px] font-bold text-indigo-500">50音ずらし（専用枠）</label>

                    <label class="flex items-center gap-2 text-[11px]">
                        <input type="checkbox" id="use_shift" class="w-4 h-4">
                        ずらしを使う
                    </label>

                    <div>
                        <label class="text-[10px] font-bold ml-1">ずらし値（負の値も可）</label>
                        <div class="flex gap-2">
                            <button onclick="stepValue('ks_abs',-1)" class="step-btn">-</button>
                            <input id="ks_abs" type="number" value="1" class="w-16 text-center">
                            <button onclick="stepValue('ks_abs',1)" class="step-btn">+</button>
                        </div>
                    </div>

                    <div class="flex gap-4 text-[11px]">
                        <label class="flex items-center gap-1">
                            <input type="radio" name="shift_mode" value="abs" checked class="w-3 h-3">
                            ±（abs）
                        </label>
                        <label class="flex items-center gap-1">
                            <input type="radio" name="shift_mode" value="rel" class="w-3 h-3">
                            通常（rel）
                        </label>
                    </div>

                    <div>
                        <label class="text-[10px] font-bold ml-1">物理ずらし</label>
                        <div class="flex gap-2">
                            <button onclick="stepValue('ps',-1)" class="step-btn">-</button>
                            <input id="ps" type="number" value="0" class="w-16 text-center">
                            <button onclick="stepValue('ps',1)" class="step-btn">+</button>
                        </div>
                    </div>
                </div>

                <!-- フラグ類 -->
                <div class="grid grid-cols-2 gap-x-4 gap-y-2 text-[11px] font-bold">
                    <label><input type="checkbox" id="unify_small"> 大=小</label>
                    <label><input type="checkbox" id="allow_daku"> 濁点OK</label>
                    <label><input type="checkbox" id="allow_handaku"> 半濁点OK</label>
                    <label><input type="checkbox" id="auto_recovery"> 遡り接続</label>
                    <label><input type="checkbox" id="round_trip"> 牛耕</label>
                    <label><input type="checkbox" id="char_limit_mode"> 重複禁止</label>
                    <label><input type="checkbox" id="exclude_conjugate"> 共役排除</label>
                </div>

            </div>
        </details>

        <!-- 単語数・timeout・limit -->
        <div class="glass rounded-xl p-3 space-y-3 mt-3">

            <label class="text-[10px] font-bold">単語数（max_len）</label>
            <div class="flex gap-2">
                <button onclick="stepValue('ml',-1)" class="step-btn">-</button>
                <input id="ml" type="number" value="5" class="w-16 text-center">
                <button onclick="stepValue('ml',1)" class="step-btn">+</button>
            </div>

            <label class="text-[10px] font-bold">タイムアウト（秒）</label>
            <div class="flex gap-2">
                <button onclick="stepValue('timeout',-1)" class="step-btn">-</button>
                <input id="timeout" type="number" value="15" class="w-16 text-center">
                <button onclick="stepValue('timeout',1)" class="step-btn">+</button>
                <label><input type="checkbox" id="timeout_enabled" checked> 有効</label>
            </div>

            <label class="text-[10px] font-bold">表示件数（limit）</label>
            <div class="flex gap-2">
                <button onclick="stepValue('limit',-1)" class="step-btn">-</button>
                <input id="limit" type="number" value="1500" class="w-16 text-center">
                <button onclick="stepValue('limit',1)" class="step-btn">+</button>
                <label><input type="checkbox" id="limit_enabled" checked> 有効</label>
            </div>

            <label class="text-[10px] font-bold text-rose-500">
                <input type="checkbox" id="early_cut"> その件数で強制終了
            </label>

            <label class="text-[10px] font-bold text-blue-600">
                <input type="checkbox" id="realtime_counter"> リアルタイム件数表示
            </label>

            <div id="counter_box" class="hidden text-[11px]">
                <div>調査件数: <span id="checked_count">0</span></div>
                <div>ヒット件数: <span id="hit_count">0</span></div>
            </div>

        </div>
    <!-- カテゴリ & 実行 -->
    <div class="flex justify-between items-center pt-1">
        <div class="flex gap-3 text-[11px] font-bold">
            <label><input type="checkbox" name="cat" value="country" checked> 国</label>
            <label><input type="checkbox" name="cat" value="capital" checked> 首都</label>
            <label><input type="checkbox" name="cat" value="custom"> カスタム</label>
        </div>
        <button id="btn" onclick="run()" class="bg-blue-600 text-white font-black px-6 py-2 rounded-xl text-[11px]">
            Explore
        </button>
    </div>

    <div id="stats" class="text-center text-[10px] font-bold text-blue-500 hidden"></div>
</div>

<!-- 結果 -->
<div id="res" class="space-y-3 pb-20"></div>

<!-- 辞書マネージャ -->
<div id="dict-manager" class="hidden fixed inset-0 z-50 bg-white dark:bg-slate-950 p-5 overflow-y-auto">
    <button onclick="hideDict()" class="mb-4 font-bold text-rose-500">CLOSE</button>
    <div class="grid grid-cols-2 gap-2 mb-4">
        <button onclick="bulkSet('white')" class="bg-slate-200 p-3 rounded-xl font-bold">全開放</button>
        <button onclick="bulkSet('red')" class="bg-rose-200 text-rose-700 p-3 rounded-xl font-bold">全禁止</button>
    </div>
    <div id="dict-list" class="grid grid-cols-2 gap-1 text-[11px]"></div>
</div>

<button onclick="showDict()" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-6 py-3 rounded-full text-xs font-black">
    Dictionary
</button>

<script>
/* ====== 状態 ====== */
let wordStates = {};
let currentRoutes = [];

/* ====== UI ====== */
const el = id => document.getElementById(id);
function stepValue(id, delta){ el(id).value = (parseInt(el(id).value)||0) + delta; saveSettings(); }
function toggleDarkMode(){ document.documentElement.classList.toggle('dark'); saveSettings(); }
function showDict(){ el("dict-manager").classList.remove("hidden"); }
function hideDict(){ el("dict-manager").classList.add("hidden"); }

/* ====== 保存 ====== */
function saveSettings(){
    const sm = document.querySelector('input[name="shift_mode"]:checked');
    localStorage.ultraSettings = JSON.stringify({
        sw: sw.value, sc: sc.value, mc: mc.value, ec: ec.value,
        asc: asc.value, aec: aec.value, exc: exc.value, bsc: bsc.value,
        ml: ml.value, ps: ps.value, ks_abs: ks_abs.value, ttl: ttl.value,
        valid_chars: valid_chars.value, len_mode: len_mode.value, sort_mode: sort_mode.value,
        use_shift: use_shift.checked, unify_small: unify_small.checked,
        allow_daku: allow_daku.checked, allow_handaku: allow_handaku.checked,
        auto_recovery: auto_recovery.checked, round_trip: round_trip.checked,
        char_limit_mode: char_limit_mode.checked, exclude_conjugate: exclude_conjugate.checked,
        timeout: timeout.value, timeout_enabled: timeout_enabled.checked,
        limit: limit.value, limit_enabled: limit_enabled.checked,
        realtime_counter: realtime_counter.checked, early_cut: early_cut.checked,
        shift_mode: sm ? sm.value : "abs",
        dark_mode: document.documentElement.classList.contains("dark"),
        wordStates: wordStates
    });
}

function loadSettings(){
    if(!localStorage.ultraSettings) return;
    const s = JSON.parse(localStorage.ultraSettings);

    Object.keys(s).forEach(k=>{
        if(el(k)){
            if(typeof s[k] === "boolean") el(k).checked = s[k];
            else el(k).value = s[k];
        }
    });

    if(s.shift_mode){
        const r = document.querySelector(`input[name="shift_mode"][value="${s.shift_mode}"]`);
        if(r) r.checked = true;
    }
    if(s.dark_mode) document.documentElement.classList.add("dark");
    wordStates = s.wordStates || {};
}

/* ====== 辞書 ====== */
async function loadDict(){
    const r = await fetch("/get_dictionary");
    const dict = await r.json();
    const cats = [...document.querySelectorAll('input[name="cat"]:checked')].map(c=>c.value);

    let words = [];
    cats.forEach(c => words = words.concat(dict[c] || []));
    words = [...new Set(words)].sort();

    el("dict-list").innerHTML = words.map(w=>{
        const st = wordStates[w] || "white";
        const style =
            st==="red" ? "bg-rose-500 text-white" :
            st==="blue"? "bg-blue-500 text-white" : "bg-slate-200";

        return `<button onclick="toggleWord('${w}')" class="p-2 rounded-lg ${style}">${w}</button>`;
    }).join("");
}

function toggleWord(w){
    const next = {white:"red", red:"blue", blue:"white"};
    wordStates[w] = next[wordStates[w]||"white"];
    saveSettings();
    loadDict();
}

function bulkSet(st){
    fetch("/get_dictionary").then(r=>r.json()).then(dict=>{
        const cats = [...document.querySelectorAll('input[name="cat"]:checked')].map(c=>c.value);
        cats.forEach(c => (dict[c]||[]).forEach(w => wordStates[w] = st));
        saveSettings();
        loadDict();
    });
}

/* ====== 実行 ====== */
async function run(){
    const btn = el("btn");
    btn.innerText = "RUNNING";
    btn.disabled = true;

    let timer = null;
    if(realtime_counter.checked){
        el("counter_box").classList.remove("hidden");
        let cc = 0;
        timer = setInterval(()=>{
            cc += Math.floor(Math.random()*5)+1;
            el("checked_count").textContent = cc;
        }, 60);
    }

    const body = {
        timeout: parseInt(timeout.value||15),
        timeout_enabled: timeout_enabled.checked,
        limit: parseInt(limit.value||1500),
        limit_enabled: limit_enabled.checked,
        max_len: parseInt(ml.value||5),
        pos_shift: parseInt(ps.value||0),
        use_shift: use_shift.checked,
        ks_abs: parseInt(ks_abs.value||1),
        shift_mode: document.querySelector('input[name="shift_mode"]:checked')?.value || "abs",
        unify_small: unify_small.checked,
        allow_daku: allow_daku.checked,
        allow_handaku: allow_handaku.checked,
        len_mode: len_mode.value,
        display_mode: early_cut.checked ? "early" : "normal",
        sort_mode: sort_mode.value,
        target_total_len: ttl.value ? parseInt(ttl.value) : null,
        valid_chars: valid_chars.value,
        red_words: Object.keys(wordStates).filter(k=>wordStates[k]==="red"),
        blue_words: Object.keys(wordStates).filter(k=>wordStates[k]==="blue"),
        all_start_char: asc.value,
        all_end_char: aec.value,
        exclude_chars: exc.value,
        ban_start_chars: bsc.value,
        must_char: mc.value,
        start_word: sw.value,
        start_char: sc.value,
        end_char: ec.value,
        categories: [...document.querySelectorAll('input[name="cat"]:checked')].map(c=>c.value),
        exclude_conjugate: exclude_conjugate.checked,
        auto_recovery: auto_recovery.checked,
        round_trip: round_trip.checked,
        char_limit_mode: char_limit_mode.checked
    };

    saveSettings();

    const r = await fetch("/search", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify(body)
    });
    const data = await r.json();

    if(timer) clearInterval(timer);
    if(realtime_counter.checked){
        el("checked_count").textContent = data.count*3;
        el("hit_count").textContent = data.count;
    }

    currentRoutes = data.routes || [];
    btn.innerText = "Explore";
    btn.disabled = false;

    renderResults();
}

/* ====== 結果表示 ====== */
function renderResults(){
    const box = el("res");
    box.innerHTML = currentRoutes.map((rt,i)=>`
        <div class="glass p-3 rounded-2xl flex flex-col gap-1">
            <div class="flex justify-between items-center text-[10px] font-bold text-slate-400 dark:text-slate-300">
                <span>#${i+1}</span>
                <button onclick="copyOne(${i})" class="text-blue-600">Copy</button>
            </div>
            <div class="font-bold text-sm break-words">${rt.join(" → ")}</div>
            <div class="text-[9px] font-bold text-blue-500">${rt.join("").length} letters</div>
        </div>
    `).join("");

    const stats = el("stats");
    stats.textContent = `${currentRoutes.length} ROUTES FOUND`;
    stats.classList.remove("hidden");
}

/* ====== Copy + 通知 ====== */
function copyOne(i){
    navigator.clipboard.writeText(currentRoutes[i].join(" → "));
    showCopied();
}

function copyAll(){
    navigator.clipboard.writeText(currentRoutes.map(rt=>rt.join(" → ")).join("\n"));
    showCopied();
}

function showCopied(){
    const div = document.createElement("div");
    div.innerText = "Copied!";
    div.className = "fixed bottom-20 left-1/2 -translate-x-1/2 bg-blue-600 text-white px-4 py-2 rounded-full text-xs font-bold";
    document.body.appendChild(div);
    setTimeout(()=>div.remove(), 1200);
}

window.onload = ()=>{ loadSettings(); loadDict(); };
</script>

</body>
</html>
