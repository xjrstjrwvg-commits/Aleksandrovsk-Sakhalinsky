<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>極・ULTRA ENGINE Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html, body { overflow-x: hidden; position: relative; width: 100%; touch-action: pan-y; }
        .glass { @apply bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 shadow-xl; }
        input, textarea { @apply bg-slate-100 dark:bg-slate-800 p-3 rounded-xl text-sm outline-none focus:ring-1 ring-blue-500 font-bold; }
        .step-btn { @apply bg-slate-200 dark:bg-slate-700 w-9 h-9 flex items-center justify-center rounded-lg font-black active:scale-90 transition-all text-xs; }
        .route-card { @apply bg-white dark:bg-slate-800 p-4 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700 mb-2 flex justify-between items-center group; }
        .success-btn { @apply bg-emerald-500 text-white !important; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 p-3 pb-24 font-sans">
    <div class="max-w-md mx-auto space-y-3">
        <header class="flex justify-between items-center">
            <h1 class="text-xl font-black italic text-blue-600 uppercase tracking-tighter">Ultra Engine</h1>
            <div class="flex gap-2">
                <button onclick="copyTop()" class="bg-blue-100 dark:bg-blue-900/30 text-blue-600 px-3 py-2 rounded-full text-[10px] font-black uppercase">Top Copy</button>
                <button onclick="copyAll()" id="allCopyBtn" class="bg-slate-200 dark:bg-slate-800 px-3 py-2 rounded-full text-[10px] font-black uppercase">All Copy</button>
            </div>
        </header>

        <!-- 辞書アコーディオン -->
        <details class="glass rounded-[20px] overflow-hidden">
            <summary class="p-4 font-bold text-[10px] uppercase cursor-pointer bg-slate-100/50 dark:bg-slate-800 flex justify-between items-center">
                Dictionary View (Country / Capital)
                <span class="text-blue-500 font-black">OPEN</span>
            </summary>
            <div id="dict_view" class="p-4 max-h-40 overflow-y-auto text-[10px] flex flex-wrap gap-1 leading-tight text-slate-400">
                Loading...
            </div>
        </details>

        <!-- メインパネル -->
        <div class="glass rounded-[28px] p-5 space-y-4">
            <input id="sw" placeholder="開始単語" class="w-full">
            <div class="grid grid-cols-4 gap-2">
                <input id="sc" placeholder="開始字">
                <input id="via" placeholder="あ→い" class="bg-blue-50 dark:bg-blue-900/20 ring-1 ring-blue-400/30">
                <input id="mc" placeholder="必須">
                <input id="ec" placeholder="終了字">
            </div>

            <div class="grid grid-cols-2 gap-2">
                <input id="exc" placeholder="除外(ン,ガ)">
                <input id="pattern" placeholder="パターン(*, ア*)">
            </div>

            <textarea id="gc" placeholder="グループ制約（改行で1組）&#10;例:アメリカ,イギリス" class="w-full h-16 text-[10px]"></textarea>

            <div class="flex justify-between items-center border-t border-slate-100 dark:border-slate-800 pt-3">
                <div class="flex gap-2 items-center">
                    <input type="checkbox" id="use_shift" class="w-4 h-4 accent-blue-600">
                    <label class="text-[10px] font-bold uppercase text-slate-400">ずらし</label>
                    <button onclick="adjustVal('ks_abs',-1)" class="step-btn">-</button>
                    <input type="number" id="ks_abs" value="1" class="w-8 text-center bg-transparent text-xs font-bold">
                    <button onclick="adjustVal('ks_abs',1)" class="step-btn">+</button>
                </div>
                <div class="flex gap-2">
                    <input type="number" id="ml" value="3" class="w-10 text-center text-xs font-bold" title="単語数">
                    <input type="number" id="ps" value="0" class="w-8 text-center text-xs font-bold" title="位置">
                    <input type="number" id="top_n" value="10" class="w-10 text-center text-xs font-bold border-l border-slate-300 dark:border-slate-600" title="上位N件">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-2 text-[9px] font-bold border-t border-slate-100 dark:border-slate-800 pt-3">
                <div class="space-y-1">
                    <label class="flex items-center gap-1"><input type="checkbox" id="allow_daku"> 濁点OK</label>
                    <label class="flex items-center gap-1"><input type="checkbox" id="allow_handaku"> 半濁点OK</label>
                    <label class="flex items-center gap-1 text-emerald-600"><input type="checkbox" id="copy_with_len" checked> 文字数含めてコピー</label>
                </div>
                <div class="space-y-1">
                    <label class="flex items-center gap-1 text-orange-500"><input type="checkbox" id="unify_small"> 小文字大文字視</label>
                    <label class="flex items-center gap-1 text-blue-500"><input type="checkbox" id="once_constraint"> 必須文字の単一制約</label>
                </div>
            </div>

            <div class="flex items-center justify-between pt-1">
                <div class="flex gap-2 text-[10px] font-black uppercase">
                    <label><input type="checkbox" name="cat" value="country" checked> 国</label>
                    <label><input type="checkbox" name="cat" value="capital" checked> 首都</label>
                </div>
                <button onclick="run()" id="btn" class="bg-blue-600 text-white font-black px-10 py-3.5 rounded-2xl shadow-lg active:scale-95 transition-all">RUN</button>
            </div>
        </div>

        <div class="flex gap-2 overflow-x-auto pb-1">
            <button onclick="sortRes('kana')" class="bg-slate-200 dark:bg-slate-800 px-3 py-1.5 rounded-lg text-[9px] font-black uppercase">50音</button>
            <button onclick="sortRes('short')" class="bg-slate-200 dark:bg-slate-800 px-3 py-1.5 rounded-lg text-[9px] font-black uppercase">文字少</button>
            <button onclick="sortRes('long')" class="bg-slate-200 dark:bg-slate-800 px-3 py-1.5 rounded-lg text-[9px] font-black uppercase">文字多</button>
        </div>

        <div id="res" class="space-y-2"></div>
    </div>

    <script>
        let currentResults = [];

        function adjustVal(id, step) {
            const el = document.getElementById(id);
            el.value = Math.max(1, parseInt(el.value) + step);
        }

        async function initDict() {
            const res = await fetch('/get_dictionary');
            const data = await res.json();
            document.getElementById('dict_view').innerHTML = [...data.country, ...data.capital].sort().map(w => `<span>${w}</span>`).join(' / ');
        }
        initDict();

        async function run() {
            const btn = document.getElementById('btn');
            btn.disabled = true; btn.innerText = "WAIT...";
            const cats = Array.from(document.querySelectorAll('input[name="cat"]:checked')).map(c => c.value);
            const data = {
                start_word: document.getElementById('sw').value,
                start_char: document.getElementById('sc').value,
                via_pattern: document.getElementById('via').value,
                must_char: document.getElementById('mc').value,
                end_char: document.getElementById('ec').value,
                exclude_chars: document.getElementById('exc').value,
                group_constraints: document.getElementById('gc').value,
                max_len: document.getElementById('ml').value,
                pos_shift: document.getElementById('ps').value,
                ks_abs: document.getElementById('ks_abs').value,
                use_shift: document.getElementById('use_shift').checked,
                allow_daku: document.getElementById('allow_daku').checked,
                allow_handaku: document.getElementById('allow_handaku').checked,
                unify_small: document.getElementById('unify_small').checked,
                once_constraint: document.getElementById('once_constraint').checked,
                categories: cats
            };
            const response = await fetch('/search', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data)});
            const result = await response.json();
            currentResults = result.routes;
            displayResults(currentResults);
            btn.disabled = false; btn.innerText = "RUN";
        }

        function displayResults(routes) {
            const resDiv = document.getElementById('res');
            resDiv.innerHTML = "";
            const withLen = document.getElementById('copy_with_len').checked;
            routes.forEach(route => {
                const routeText = route.join(' → ');
                const totalLen = route.join('').length;
                const copyStr = withLen ? `${routeText} (${totalLen})` : routeText;
                const card = document.createElement('div');
                card.className = 'route-card';
                card.innerHTML = `<div><div class="text-[9px] text-blue-500 font-black uppercase">${totalLen} chars</div><div class="font-bold text-sm">${routeText}</div></div>
                                  <button onclick="copyText('${copyStr}', this)" class="opacity-0 group-hover:opacity-100 bg-blue-600 text-white text-[9px] px-3 py-2 rounded-lg font-bold transition-all">COPY</button>`;
                resDiv.appendChild(card);
            });
        }

        function sortRes(mode) {
            if (mode === 'kana') currentResults.sort((a,b) => a.join('').localeCompare(b.join(''), 'ja'));
            if (mode === 'short') currentResults.sort((a,b) => a.join('').length - b.join('').length);
            if (mode === 'long') currentResults.sort((a,b) => b.join('').length - a.join('').length);
            displayResults(currentResults);
        }

        function getCopyText(routes) {
            const withLen = document.getElementById('copy_with_len').checked;
            return routes.map(r => withLen ? `${r.join(' → ')} (${r.join('').length})` : r.join(' → ')).join('\n');
        }

        function copyAll() {
            navigator.clipboard.writeText(getCopyText(currentResults));
            const b = document.getElementById('allCopyBtn'); b.innerText = "DONE!"; setTimeout(() => b.innerText = "ALL COPY", 1000);
        }

        function copyTop() {
            const n = parseInt(document.getElementById('top_n').value);
            navigator.clipboard.writeText(getCopyText(currentResults.slice(0, n)));
            alert(`上位${n}件をコピーしました`);
        }

        function copyText(txt, btn) {
            navigator.clipboard.writeText(txt);
            btn.innerText = "DONE!"; btn.classList.add('success-btn');
            setTimeout(() => { btn.innerText = "COPY"; btn.classList.remove('success-btn'); }, 1000);
        }
    </script>
</body>
</html>
