<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>極・ULTRA ENGINE Pro</title>
    <style>
        :root { --bg: #f8fafc; --text: #0f172a; --glass: #ffffff; --border: #e2e8f0; --accent: #2563eb; --input-bg: #f1f5f9; }
        .dark { --bg: #020617; --text: #f1f5f9; --glass: #0f172a; --border: #1e293b; --accent: #3b82f6; --input-bg: #1e293b; }
        
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }

        body { background-color: var(--bg); color: var(--text); margin: 0; padding: 10px; line-height: 1.3; overflow-x: hidden; min-height: 100vh; transition: background 0.3s; }
        .max-w-md { max-width: 400px; margin: 0 auto; display: flex; flex-direction: column; gap: 10px; }
        .glass { background-color: var(--glass); border: 1px solid var(--border); border-radius: 20px; padding: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        
        header { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; }
        .title { font-weight: 900; color: var(--accent); font-style: italic; text-transform: uppercase; font-size: 18px; letter-spacing: -0.5px; }
        
        input, select, button { background-color: var(--input-bg); border: none; border-radius: 10px; padding: 10px; font-size: 14px; font-weight: 700; color: var(--text); width: 100%; outline: none; transition: 0.2s; -webkit-appearance: none; }
        
        /* 操作パネルの重なり防止 */
        .step-container { display: flex; align-items: center; justify-content: space-between; gap: 5px; background: var(--input-bg); border-radius: 12px; padding: 5px 10px; min-width: 130px; }
        .step-container span { font-size: 10px; font-weight: 900; opacity: 0.6; white-space: nowrap; }
        .step-container input { width: 45px !important; padding: 0 !important; text-align: center !important; background: none !important; font-size: 15px; font-weight: 900; }
        .step-btn { width: 30px; height: 30px; background-color: var(--border); display: flex; align-items: center; justify-content: center; border-radius: 8px; cursor: pointer; font-weight: 900; }

        /* チェックボックスの視覚強化 */
        input[type="checkbox"] { 
            -webkit-appearance: none; appearance: none;
            width: 22px !important; height: 22px !important; margin: 0 8px 0 0 !important; 
            background-color: var(--input-bg); border: 2px solid var(--border); border-radius: 6px;
            cursor: pointer; position: relative; transition: 0.2s; flex-shrink: 0;
        }
        input[type="checkbox"]:checked { background-color: var(--accent) !important; border-color: var(--accent) !important; }
        input[type="checkbox"]:checked::after { 
            content: "✔"; position: absolute; color: white; font-size: 14px; 
            left: 50%; top: 50%; transform: translate(-50%, -50%); 
        }
        label:has(input:checked) { color: var(--accent); font-weight: 900; }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .checkbox-group { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 5px; padding: 10px 0; }
        label { display: flex !important; align-items: center !important; font-size: 11px; font-weight: 900; cursor: pointer; }

        #btn { background: var(--accent); color: white; font-weight: 900; font-size: 16px; cursor: pointer; padding: 15px; }
        
        /* 検索結果・牛耕式表示 */
        .res-card { background: var(--glass); border-radius: 18px; padding: 18px; border: 1px solid var(--border); margin-bottom: 12px; display: flex; flex-direction: column; gap: 6px; }
        .ln-norm { text-align: left; font-weight: 700; }
        .ln-rev { text-align: right; color: var(--accent); font-weight: 900; }
        
        .badge { font-size: 10px; font-weight: 900; padding: 6px 12px; border-radius: 8px; color: white; }
        
        #dict-manager { position: fixed; inset: 0; z-index: 9999; background: var(--bg); display: none; overflow-y: auto; }
        .sticky-close { position: sticky; top: 0; background: #ef4444; color: white; padding: 15px; text-align: center; font-weight: 900; cursor: pointer; z-index: 100; }
        
        summary { font-size: 11px; font-weight: 900; text-align: center; cursor: pointer; color: var(--accent); padding: 8px; list-style: none; border-top: 1px solid var(--border); }
        .hidden { display: none !important; }
    </style>
</head>
<body onchange="saveSettings()">

    <div class="max-w-md">
        <header>
            <span class="title">Ultra Engine Pro</span>
            <div style="display:flex; gap:8px;">
                <button onclick="allReset()" style="width:auto; padding:8px 12px; background:#ef4444; color:white; font-size:10px;">ALL RESET</button>
                <button onclick="openDict()" style="width:auto; background:var(--accent); color:white; padding:8px 15px;">📕</button>
            </div>
        </header>

        <div class="glass">
            <div class="grid-2" style="margin-bottom:10px;">
                <input id="start_word" placeholder="開始単語" autocomplete="off">
                <input id="must_char" placeholder="必須文字" autocomplete="off">
            </div>
            <div class="grid-2" style="margin-bottom:10px;">
                <input id="sc" placeholder="開始字" autocomplete="off">
                <input id="ec" placeholder="終了字" autocomplete="off">
            </div>
            
            <details id="details_menu">
                <summary>＋ ADVANCED SETTINGS</summary>
                <div style="padding-top:10px; display:flex; flex-direction:column; gap:10px;">
                    <div class="grid-2">
                        <input id="must_order" placeholder="出現順序(正順)">
                        <input id="exc" placeholder="全体除外文字">
                    </div>
                    <div class="grid-2">
                        <div class="step-container">
                            <span>物理</span>
                            <div class="step-btn" onclick="step('p_shift',-1)">-</div>
                            <input id="p_shift" value="0" readonly>
                            <div class="step-btn" onclick="step('p_shift',1)">+</div>
                        </div>
                        <div class="step-container">
                            <span>ずらし</span>
                            <div class="step-btn" onclick="step('ks_abs',-1)">-</div>
                            <input id="ks_abs" value="0" readonly>
                            <div class="step-btn" onclick="step('ks_abs',1)">+</div>
                        </div>
                    </div>
                    <div class="grid-2">
                        <input id="target_total" type="number" placeholder="合計文字数指定">
                        <select id="sort_mode">
                            <option value="default">50音順</option>
                            <option value="len_asc">少字数順</option>
                            <option value="len_desc">多字数順</option>
                            <option value="random">ランダム</option>
                        </select>
                    </div>
                    <div class="checkbox-group">
                        <label><input type="checkbox" id="rt" checked> 牛耕式</label>
                        <label><input type="checkbox" id="exclude_conjugate" checked> 共役排除</label>
                        <label><input type="checkbox" id="char_limit_mode" checked> 重複禁止</label>
                        <label><input type="checkbox" id="use_shift" checked> ずらし有効</label>
                        <label><input type="checkbox" id="copy_newline" checked> 改行コピー</label>
                        <label><input type="checkbox" id="copy_with_len" checked> 文字数付与</label>
                        <label><input type="checkbox" id="copy_with_index" checked> 番号付与</label>
                        <label><input type="checkbox" id="early_stop" checked> 到達打切</label>
                    </div>
                </div>
            </details>

            <div style="margin-top:10px; display:flex; align-items:center; gap:8px;">
                <div class="step-container" style="flex:1;">
                    <span style="font-weight:900;">連鎖</span>
                    <div class="step-btn" onclick="step('max_len',-1)">-</div>
                    <input id="max_len" value="5" readonly>
                    <div class="step-btn" onclick="step('max_len',1)">+</div>
                </div>
                <button id="btn" onclick="run()" style="flex:1.5;">EXPLORE</button>
            </div>
        </div>

        <!-- 統計エリア -->
        <div id="stats" class="hidden glass" style="text-align:center;">
            <div style="display:flex; justify-content:space-around; margin-bottom:12px;">
                <div><div style="font-size:10px; opacity:0.5; font-weight:900;">ROUTES</div><div id="stat_count" style="font-size:24px; font-weight:900; color:var(--accent);">0</div></div>
                <div><div style="font-size:10px; opacity:0.5; font-weight:900;">ULTRA SCORE</div><div id="stat_score" style="font-size:24px; font-weight:900;">0</div></div>
            </div>
            <div id="rank_display" style="display:flex; justify-content:center; gap:6px; flex-wrap:wrap; margin-bottom:15px;"></div>
            
            <div style="border-top:1px solid var(--border); padding-top:12px; display:flex; gap:8px; align-items:center;">
                <div class="step-container" style="flex:1.2;">
                    <span>上位</span>
                    <input id="copy_num" type="number" value="10">
                    <div class="step-btn" onclick="step('copy_num',-5)" style="width:24px; height:24px;">-</div>
                    <div class="step-btn" onclick="step('copy_num',5)" style="width:24px; height:24px;">+</div>
                </div>
                <button onclick="copyBulk('top')" style="flex:1; font-size:11px; background:var(--accent); color:white;">上位コピー</button>
                <button onclick="copyBulk('all')" style="flex:1; font-size:11px; background:#10b981; color:white;">全てコピー</button>
            </div>
        </div>

        <div id="res"></div>
    </div>

    <!-- 辞書マネージャー -->
    <div id="dict-manager">
        <div class="sticky-close" onclick="closeDict()">CLOSE DICTIONARY (TAP HERE)</div>
        <div id="dict-list" style="display:grid; grid-template-columns:repeat(2, 1fr); gap:8px; padding:15px;"></div>
    </div>

    <script>
        let currentRoutes = [];
        let wordStates = {};

        function step(id, d) {
            const e = document.getElementById(id);
            e.value = parseInt(e.value) + d;
            saveSettings();
        }

        function openDict() {
            document.getElementById('dict-manager').style.display = 'block';
            loadDictionaryUI();
        }

        function closeDict() {
            document.getElementById('dict-manager').style.display = 'none';
        }

        async function loadDictionaryUI() {
            try {
                const r = await fetch('/get_dictionary');
                const d = await r.json();
                const words = [...(d.country || []), ...(d.capital || [])].sort();
                document.getElementById('dict-list').innerHTML = words.map(w => {
                    const s = wordStates[w] || 'white';
                    const bg = s === 'red' ? '#f43f5e' : s === 'blue' ? '#2563eb' : 'var(--input-bg)';
                    const co = s === 'white' ? 'var(--text)' : 'white';
                    return `<button onclick="toggleWord('${w}')" style="background:${bg}; color:${co}; font-size:11px; padding:10px; border-radius:8px; border:1px solid var(--border); cursor:pointer;">${w}</button>`;
                }).join('');
            } catch (e) {}
        }

        function toggleWord(w) {
            const s = wordStates[w] || 'white';
            wordStates[w] = s === 'white' ? 'red' : s === 'red' ? 'blue' : 'white';
            loadDictionaryUI();
            saveSettings();
        }

        async function run() {
            const btn = document.getElementById('btn');
            btn.innerText = "WAIT...";
            btn.disabled = true;

            const body = {
                red_words: Object.keys(wordStates).filter(k => wordStates[k] === 'red'),
                blue_words: Object.keys(wordStates).filter(k => wordStates[k] === 'blue'),
                categories: ["country", "capital"]
            };

            document.querySelectorAll('input, select').forEach(el => {
                if (el.id) body[el.id] = el.type === 'checkbox' ? el.checked : el.value;
            });

            try {
                const r = await fetch('/search', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(body)
                });
                const d = await r.json();
                currentRoutes = d.routes || [];
                updateUI(d.count, d.score);
            } catch (e) {
                alert("探索失敗");
            }
            btn.innerText = "EXPLORE";
            btn.disabled = false;
        }

        function updateUI(count, score) {
            document.getElementById('stat_count').innerText = count.toLocaleString();
            document.getElementById('stat_score').innerText = score.toLocaleString();
            
            let r20 = 1;
            if (score > 1000000) r20 = 18 + Math.min(2, Math.floor(score/1000000));
            else if (score > 500000) r20 = 15 + Math.floor((score-500000)/150000);
            else if (score > 100000) r20 = 10 + Math.floor((score-100000)/80000);
            else r20 = Math.max(1, Math.ceil(score/10000));
            r20 = Math.min(20, r20);

            const colors = { iron: "#4b5563", bronze: "#92400e", silver: "#94a3b8", gold: "#eab308", platinum: "#2dd4bf", diamond: "#3b82f6" };
            let bg = r20 <= 3 ? colors.iron : r20 <= 7 ? colors.bronze : r20 <= 11 ? colors.silver : r20 <= 15 ? colors.gold : r20 <= 18 ? colors.platinum : colors.diamond;
            
            const r5 = ['E','D','C','B','A'][Math.min(4, Math.floor((r20-1)/4))];
            const r10 = Math.ceil(r20/2);

            document.getElementById('rank_display').innerHTML = `
                <span class="badge" style="background:#2563eb;">5階級: ${r5}</span>
                <span class="badge" style="background:#10b981;">10階級: ${r10}</span>
                <span class="badge" style="background:${bg}; color:white;">Rank ${r20}</span>
            `;
            
            document.getElementById('stats').classList.remove('hidden');
            display();
        }

        function display() {
            const isRt = document.getElementById('rt').checked;
            document.getElementById('res').innerHTML = currentRoutes.map((rt, i) => {
                const lines = rt.map((w, idx) => {
                    const rev = isRt && idx % 2 !== 0;
                    return `<div class="${rev ? 'ln-rev' : 'ln-norm'}">${rev ? w.split('').reverse().join('') + ' ◀' : (idx > 0 ? '▶ ' : '') + w}</div>`;
                });
                return `<div class="res-card"><div style="font-size:10px; opacity:0.5; margin-bottom:8px;">#${i+1} (${rt.join('').length}字)</div>${lines.join('')}</div>`;
            }).join('');
        }

        function copyBulk(type) {
            const num = type === 'top' ? parseInt(document.getElementById('copy_num').value) || 10 : currentRoutes.length;
            const targets = currentRoutes.slice(0, num);
            const nl = document.getElementById('copy_newline').checked;
            const withLen = document.getElementById('copy_with_len').checked;
            const withIdx = document.getElementById('copy_with_index').checked;
            const isRt = document.getElementById('rt').checked;

            const text = targets.map((rt, i) => {
                let dRt = rt.map((w, idx) => (isRt && idx % 2 !== 0) ? w.split('').reverse().join('') : w);
                let line = (withIdx ? `${i+1}: ` : "") + dRt.join(nl ? '\n' : ' → ');
                if (withLen) line += (nl ? '\n' : ' ') + `(${rt.join('').length}字)`;
                return line;
            }).join('\n\n');

            navigator.clipboard.writeText(text);
            alert(`${targets.length}件完了`);
        }

        function saveSettings() {
            const s = { wordStates };
            document.querySelectorAll('input, select').forEach(el => {
                if (el.id) s[el.id] = el.type === 'checkbox' ? el.checked : el.value;
            });
            localStorage.setItem('ultra_config_v16', JSON.stringify(s));
        }

        window.onload = () => {
            const s = JSON.parse(localStorage.getItem('ultra_config_v16') || "{}");
            wordStates = s.wordStates || {};
            Object.keys(s).forEach(k => {
                const el = document.getElementById(k);
                if (el) {
                    if (el.type === 'checkbox') el.checked = s[k];
                    else el.value = s[k];
                }
            });
        };

        function allReset() {
            if(confirm("全て初期化しますか？")) {
                localStorage.clear();
                location.reload();
            }
        }
    </script>
</body>
</html>
