<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>極・ULTRA ENGINE Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html, body { overflow-x: hidden; position: relative; width: 100%; touch-action: pan-y; }
        .dark { color-scheme: dark; }
        .glass { @apply bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 shadow-xl; }
        input, select, textarea { @apply bg-slate-100 dark:bg-slate-800 p-3 rounded-xl text-sm outline-none focus:ring-1 ring-blue-500 font-bold; }
        .step-btn { @apply bg-slate-200 dark:bg-slate-700 w-9 h-9 flex items-center justify-center rounded-lg font-black active:scale-90 transition-all text-sm; }
        ::-webkit-scrollbar { display: none; }
        .btn-white { background-color: white; color: #334155; border-color: #e2e8f0; }
        .dark .btn-white { background-color: #1e293b; color: #f1f5f9; border-color: #334155; }
        .custom-scroll { max-height: 300px; overflow-y: auto; scrollbar-width: none; }
        summary { list-style: none; cursor: pointer; }
        summary::-webkit-details-marker { display: none; }
        details input, details select, details textarea {
            @apply border-2 border-slate-300 dark:border-slate-600 py-4 px-4 my-1;
            background-color: rgba(255, 255, 255, 0.7);
        }
        .dark details input, .dark details select, .dark details textarea {
            background-color: rgba(30, 41, 59, 0.7);
        }
    </style>
</head>

<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 p-3 pb-24" onchange="saveSettings()" oninput="saveSettings()">
    <div class="max-w-md mx-auto space-y-3">

        <header class="flex justify-between items-center py-1">
            <div class="flex items-center gap-3">
                <h1 class="text-xl font-black italic text-blue-600 uppercase tracking-tighter">Ultra Engine</h1>
                <button onclick="toggleDarkMode()" class="text-xl p-1 hover:scale-110 transition-transform">🌗</button>
            </div>

            <div class="flex gap-2">
                <button onclick="resetSettings()" class="bg-rose-100 dark:bg-rose-900/30 text-rose-600 px-4 py-2 rounded-full text-[10px] font-bold uppercase">Reset</button>
                <button onclick="copyAll()" id="allCopyBtn" class="bg-slate-200 dark:bg-slate-800 px-4 py-2 rounded-full text-[10px] font-bold uppercase">All Copy</button>
            </div>
        </header>

        <div class="glass rounded-[28px] p-5 space-y-4 shadow-2xl">

            <input id="sw" placeholder="開始単語" class="w-full">

            <div class="grid grid-cols-3 gap-2">
                <input id="sc" placeholder="開始字" class="w-full">
                <input id="mc" placeholder="必須文字 (ア:2,イ)" class="w-full">
                <input id="ec" placeholder="終了字" class="w-full">
            </div>

            <details class="group border border-slate-200 dark:border-slate-700 rounded-2xl p-2 bg-slate-50/50 dark:bg-slate-800/20">
                <summary class="flex justify-center items-center py-3 cursor-pointer">
                    <span class="text-[11px] font-black text-blue-600 dark:text-blue-400 uppercase tracking-widest group-open:hidden">＋ 詳細設定を表示</span>
                    <span class="text-[11px] font-black text-rose-500 uppercase tracking-widest hidden group-open:block">－ 詳細設定を閉じる</span>
                </summary>

                <div class="space-y-5 pt-2 pb-4 px-1">

                    <div class="grid grid-cols-2 gap-3 border-t border-slate-200 dark:border-slate-700 pt-4">
                        <div class="space-y-1">
                            <label class="text-[10px] font-bold text-blue-500 uppercase ml-1">全語開始字</label>
                            <input id="asc" placeholder="ア,カ" class="w-full">
                        </div>
                        <div class="space-y-1">
                            <label class="text-[10px] font-bold text-blue-500 uppercase ml-1">全語終了字</label>
                            <input id="aec" placeholder="ン,イ" class="w-full">
                        </div>
                    </div>

                    <div class="space-y-1 border-t border-slate-200 dark:border-slate-700 pt-4">
                        <label class="text-[10px] font-bold text-emerald-500 uppercase ml-1">使える文字チェックリスト</label>
                        <input id="valid_chars" placeholder="アイウエオ (空欄で全許可)" class="w-full">
                    </div>

                    <div class="grid grid-cols-2 gap-3 border-t border-slate-200 dark:border-slate-700 pt-4">
                        <div class="space-y-1">
                            <label class="text-[10px] font-bold text-slate-400 uppercase ml-1 tracking-widest">グループ必須 (:n可)</label>
                            <textarea id="gc" placeholder="アメリカ,イギリス:2" class="w-full h-20 resize-none text-[10px]"></textarea>
                        </div>
                        <div class="space-y-1 text-orange-600">
                            <label class="text-[10px] font-bold uppercase ml-1 tracking-widest">選択必須 (:n可)</label>
                            <textarea id="cc" placeholder="ン,ン:2" class="w-full h-20 resize-none text-[10px]"></textarea>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-3 border-t border-slate-200 dark:border-slate-700 pt-4">
                        <div class="space-y-1">
                            <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">使用不可文字</label>
                            <input id="exc" placeholder="ン,ガ" class="w-full">
                        </div>
                        <div class="space-y-1">
                            <label class="text-[10px] font-bold text-rose-400 uppercase ml-1">禁止開始文字</label>
                            <input id="bsc" placeholder="ガ,ザ" class="w-full">
                        </div>
                    </div>

                    <div class="space-y-3 border-t border-slate-200 dark:border-slate-700 pt-4">
                        <div class="flex justify-between items-center">
                            <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">50音ずらし (物理位置連動)</label>
                            <input type="checkbox" id="use_shift" class="w-6 h-6 cursor-pointer accent-blue-600">
                        </div>
                        <div class="flex items-center gap-3 bg-slate-100 dark:bg-slate-800 p-3 rounded-xl">
                            <div class="flex gap-4 font-bold text-[11px]">
                                <label class="cursor-pointer flex items-center gap-2"><input type="radio" name="shift_mode" value="abs" checked class="w-4 h-4"> ±</label>
                                <label class="cursor-pointer flex items-center gap-2"><input type="radio" name="shift_mode" value="normal" class="w-4 h-4"> 通常</label>
                            </div>
                            <div class="flex items-center gap-3 ml-auto">
                                <button type="button" onclick="adjustVal('ks_abs',-1)" class="step-btn">-</button>
                                <input type="number" id="ks_abs" value="1" class="w-12 text-center bg-transparent border-none text-sm font-bold">
                                <button type="button" onclick="adjustVal('ks_abs',1)" class="step-btn">+</button>
                            </div>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-3 border-t border-slate-200 dark:border-slate-700 pt-4">
                        <div class="space-y-1">
                            <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">ソート順</label>
                            <select id="sort_mode" class="w-full text-[11px] font-bold">
                                <option value="default">検索順</option>
                                <option value="kana">50音順</option>
                                <option value="len_asc">文字数少ない順</option>
                                <option value="len_desc">文字数多い順</option>
                                <option value="random">ランダム</option>
                            </select>
                        </div>
                        <div class="space-y-1">
                            <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">適用範囲</label>
                            <select id="unify_scope" class="w-full text-[11px] font-bold">
                                <option value="all">すべて</option>
                                <option value="conn">接続のみ</option>
                                <option value="filter">制約のみ</option>
                            </select>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-x-4 gap-y-3 text-[11px] font-bold border-t border-slate-200 dark:border-slate-700 pt-4">
                        <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" id="allow_daku" class="w-4 h-4"> 濁点OK</label>
                        <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" id="allow_handaku" class="w-4 h-4"> 半濁点OK</label>
                        <label class="flex items-center gap-2 cursor-pointer text-indigo-600"><input type="checkbox" id="auto_recovery" class="w-4 h-4"> 遡り接続</label>
                        <label class="flex items-center gap-2 cursor-pointer text-orange-600"><input type="checkbox" id="unify_small" class="w-4 h-4"> 大=小</label>
                        <label class="flex items-center gap-2 cursor-pointer text-blue-600"><input type="checkbox" id="rt" class="w-4 h-4"> 牛耕</label>
                        <label class="flex items-center gap-2 cursor-pointer text-blue-600"><input type="checkbox" id="once" class="w-4 h-4"> 単一制約</label>
                        <label class="flex items-center gap-2 cursor-pointer text-rose-600"><input type="checkbox" id="char_limit_mode" class="w-4 h-4"> 重複禁止</label>
                        <label class="flex items-center gap-2 cursor-pointer text-rose-500"><input type="checkbox" id="exclude_conjugate" class="w-4 h-4"> 共役排除</label>
                    </div>

                    <div class="grid grid-cols-2 gap-3 border-t border-slate-200 dark:border-slate-700 pt-4">
                        <div class="space-y-1">
                            <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">タイムアウト(秒)</label>
                            <input type="number" id="timeout" value="15" class="w-full text-center text-sm font-bold border-2">
                        </div>
                        <div class="space-y-1">
                            <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">表示上限件数(limit)</label>
                            <input type="number" id="limit" value="1500" class="w-full text-center text-sm font-bold border-2">
                        </div>
                    </div>

                    <div class="space-y-1 text-right border-t border-slate-200 dark:border-slate-700 pt-4">
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1 text-right block">物理ずらし / 文字計(ttl)</label>
                        <div class="flex justify-end gap-3">
                            <input type="number" id="ps" value="0" class="w-14 text-center text-sm font-bold border-2">
                            <input type="number" id="ttl" placeholder="計" class="w-16 text-center text-sm font-bold border-2">
                        </div>
                    </div>
                </div>
            </details>

            <div class="grid grid-cols-2 gap-4 border-t border-slate-100 dark:border-slate-800 pt-3">
                <div class="space-y-1">
                    <label class="text-[9px] font-bold text-emerald-500 uppercase tracking-widest">文字数構成</label>
                    <select id="len_mode" class="w-full text-[10px] font-bold">
                        <option value="free">自由</option>
                        <option value="same">すべて同じ</option>
                        <option value="diff">すべてバラバラ</option>
                    </select>
                </div>
                <div class="space-y-1">
                    <label class="text-[9px] font-bold text-slate-400 uppercase tracking-widest ml-1 text-right block">コピー制限数</label>
                    <input type="number" id="copy_limit" value="10" class="w-full text-center text-xs py-2">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4 border-t border-slate-100 dark:border-slate-800 pt-3">
                <div class="space-y-1">
                    <label class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">単語数</label>
                    <div class="flex items-center gap-2">
                        <button type="button" onclick="adjustVal('ml',-1)" class="step-btn">-</button>
                        <input type="number" id="ml" value="5" class="w-10 text-center bg-transparent border-none text-sm font-bold">
                        <button type="button" onclick="adjustVal('ml',1)" class="step-btn">+</button>
                    </div>
                </div>
                <div class="space-y-1">
                    <label class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">表示モード</label>
                    <select id="display_mode" class="w-full text-[10px] font-bold">
                        <option value="normal">通常</option>
                        <option value="realtime">リアルタイム</option>
                        <option value="count">数字のみ</option>
                        <option value="early">早期切上</option>
                    </select>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4 border-t border-slate-100 dark:border-slate-800 pt-3">
                <div class="space-y-1">
                    <label class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">辞書カテゴリ</label>
                    <div class="flex gap-3 text-[11px] font-bold">
                        <label class="cursor-pointer text-blue-500"><input type="checkbox" name="cat" value="country" checked onchange="loadDictionaryUI()"> 国</label>
                        <label class="cursor-pointer text-blue-500"><input type="checkbox" name="cat" value="capital" onchange="loadDictionaryUI()"> 首都</label>
                    </div>
                </div>
                <div class="space-y-1">
                    <label class="text-[9px] font-bold text-slate-400 uppercase tracking-widest ml-1 text-right block">limit有効</label>
                    <div class="flex justify-end items-center">
                        <input type="checkbox" id="limit_enabled" checked class="w-5 h-5 cursor-pointer accent-blue-600">
                    </div>
                </div>
            </div>

            <div id="stats" class="text-center text-[10px] font-bold text-blue-500 hidden uppercase py-1"></div>

            <!-- ★★★ Explore ボタン（スタートボタン） ★★★ -->
            <button id="btn" onclick="run()" class="w-full bg-blue-600 text-white py-4 rounded-full font-black text-sm tracking-widest active:scale-95 transition-all">
                Explore
            </button>
        </div>

        <div id="res" class="space-y-3 pb-20"></div>
    </div>

    <div id="dict-manager" class="hidden fixed inset-0 z-50 bg-white dark:bg-slate-950 p-5 overflow-y-auto">
        <button onclick="document.getElementById('dict-manager').classList.add('hidden')" class="mb-5 font-bold text-rose-500">CLOSE</button>
        <div class="grid grid-cols-2 gap-2 mb-5">
            <button onclick="setAllDict('normal')" class="bg-slate-200 dark:bg-slate-700 p-2 rounded-lg text-xs font-bold">全て通常</button>
            <button onclick="setAllDict('ban')" class="bg-rose-200 dark:bg-rose-800 p-2 rounded-lg text-xs font-bold">全て禁止</button>
            <button onclick="setAllDict('must')" class="bg-emerald-200 dark:bg-emerald-800 p-2 rounded-lg text-xs font-bold">全て必須</button>
            <button onclick="saveDict()" class="bg-blue-200 dark:bg-blue-800 p-2 rounded-lg text-xs font-bold">保存</button>
        </div>

        <div id="dict-list" class="custom-scroll space-y-2"></div>
    </div>

    <script>
        function toggleDarkMode() {
            document.documentElement.classList.toggle("dark");
            localStorage.setItem("dark", document.documentElement.classList.contains("dark"));
        }

        if (localStorage.getItem("dark") === "true") {
            document.documentElement.classList.add("dark");
        }

        function adjustVal(id, delta) {
            const el = document.getElementById(id);
            el.value = Number(el.value || 0) + delta;
            saveSettings();
        }

        function saveSettings() {
            const ids = [
                "sw","sc","mc","ec","asc","aec","valid_chars","gc","cc","exc","bsc",
                "ks_abs","sort_mode","unify_scope","timeout","limit","ps","ttl",
                "len_mode","copy_limit","ml","display_mode"
            ];
            const data = {};
            ids.forEach(id => data[id] = document.getElementById(id).value);

            const checks = [
                "use_shift","allow_daku","allow_handaku","auto_recovery","unify_small",
                "rt","once","char_limit_mode","exclude_conjugate","limit_enabled"
            ];
            checks.forEach(id => data[id] = document.getElementById(id).checked);

            const cats = [...document.querySelectorAll("input[name='cat']")].map(c => ({v:c.value, c:c.checked}));
            data["cats"] = cats;

            localStorage.setItem("ultra_settings", JSON.stringify(data));
        }

        function loadSettings() {
            const raw = localStorage.getItem("ultra_settings");
            if (!raw) return;
            const data = JSON.parse(raw);

            Object.keys(data).forEach(k => {
                const el = document.getElementById(k);
                if (!el) return;
                if (typeof data[k] === "boolean") el.checked = data[k];
                else el.value = data[k];
            });

            if (data.cats) {
                data.cats.forEach(o => {
                    const el = document.querySelector(`input[name='cat'][value='${o.v}']`);
                    if (el) el.checked = o.c;
                });
            }
        }

        loadSettings();
        function loadDictionaryUI() {
            fetch("/get_dictionary")
                .then(r => r.json())
                .then(dict => {
                    const cats = [...document.querySelectorAll("input[name='cat']:checked")].map(c => c.value);
                    let words = [];
                    cats.forEach(c => words.push(...dict[c]));
                    words = [...new Set(words)];

                    const list = document.getElementById("dict-list");
                    list.innerHTML = "";

                    const saved = JSON.parse(localStorage.getItem("dict_status") || "{}");

                    words.forEach(w => {
                        const st = saved[w] || "normal";
                        const btn = document.createElement("button");
                        btn.textContent = w;
                        btn.className =
                            "w-full text-left px-3 py-2 rounded-lg font-bold text-xs " +
                            (st === "ban"
                                ? "bg-rose-300 dark:bg-rose-800"
                                : st === "must"
                                ? "bg-emerald-300 dark:bg-emerald-800"
                                : "bg-slate-200 dark:bg-slate-700");

                        btn.onclick = () => {
                            const now = saved[w] || "normal";
                            const next = now === "normal" ? "ban" : now === "ban" ? "must" : "normal";
                            saved[w] = next;
                            localStorage.setItem("dict_status", JSON.stringify(saved));
                            loadDictionaryUI();
                        };

                        list.appendChild(btn);
                    });
                });
        }

        function setAllDict(mode) {
            const raw = localStorage.getItem("dict_status");
            const saved = raw ? JSON.parse(raw) : {};
            Object.keys(saved).forEach(k => saved[k] = mode);
            localStorage.setItem("dict_status", JSON.stringify(saved));
            loadDictionaryUI();
        }

        function saveDict() {
            alert("辞書設定を保存しました");
        }

        function copyAll() {
            const limit = Number(document.getElementById("copy_limit").value || 10);
            const items = [...document.querySelectorAll(".route-item")].slice(0, limit);
            const text = items.map(i => i.textContent.trim()).join("\n");
            navigator.clipboard.writeText(text);
            alert("コピーしました");
        }

        function renderRoute(route) {
            const div = document.createElement("div");
            div.className =
                "route-item bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 p-3 rounded-xl text-sm font-bold shadow";
            div.textContent = route.join(" → ");
            return div;
        }

        async function run() {
            document.getElementById("res").innerHTML = "";
            document.getElementById("stats").classList.add("hidden");

            const payload = {
                start_word: sw.value,
                start_char: sc.value,
                must_char: mc.value,
                end_char: ec.value,
                all_start_char: asc.value,
                all_end_char: aec.value,
                valid_chars: valid_chars.value,
                group_constraints: gc.value.split("\n"),
                choice_constraints: cc.value.split("\n"),
                exclude_chars: exc.value,
                ban_start_chars: bsc.value,
                ks_abs: ks_abs.value,
                sort_mode: sort_mode.value,
                unify_scope: unify_scope.value,
                timeout: timeout.value,
                limit: limit.value,
                pos_shift: ps.value,
                target_total_len: ttl.value,
                len_mode: len_mode.value,
                copy_limit: copy_limit.value,
                max_len: ml.value,
                display_mode: display_mode.value,
                categories: [...document.querySelectorAll("input[name='cat']:checked")].map(c => c.value),
                use_shift: use_shift.checked,
                allow_daku: allow_daku.checked,
                allow_handaku: allow_handaku.checked,
                auto_recovery: auto_recovery.checked,
                unify_small: unify_small.checked,
                round_trip: rt.checked,
                once_constraint: once.checked,
                char_limit_mode: char_limit_mode.checked,
                exclude_conjugate: exclude_conjugate.checked,
                limit_enabled: limit_enabled.checked,
                red_words: Object.keys(JSON.parse(localStorage.getItem("dict_status") || "{}")).filter(
                    k => JSON.parse(localStorage.getItem("dict_status"))[k] === "ban"
                ),
                blue_words: Object.keys(JSON.parse(localStorage.getItem("dict_status") || "{}")).filter(
                    k => JSON.parse(localStorage.getItem("dict_status"))[k] === "must"
                )
            };

            const mode = display_mode.value;

            if (mode === "realtime") {
                runRealtime(payload);
                return;
            }

            const res = await fetch("/search", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify(payload)
            });

            const data = await res.json();
            const box = document.getElementById("res");

            if (mode === "count") {
                box.innerHTML =
                    `<div class="text-center text-xl font-black text-blue-600 py-10">${data.count} 件</div>`;
                return;
            }

            data.routes.forEach(r => box.appendChild(renderRoute(r)));

            document.getElementById("stats").textContent = `${data.count} 件`;
            document.getElementById("stats").classList.remove("hidden");
        }

        async function runRealtime(payload) {
            const box = document.getElementById("res");
            box.innerHTML = "";

            const res = await fetch("/search", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify(payload)
            });

            const data = await res.json();

            let i = 0;
            function step() {
                if (i >= data.routes.length) return;
                box.appendChild(renderRoute(data.routes[i]));
                i++;
                requestAnimationFrame(step);
            }
            step();

            document.getElementById("stats").textContent = `${data.count} 件`;
            document.getElementById("stats").classList.remove("hidden");
        }
    </script>
</body>
</html>
