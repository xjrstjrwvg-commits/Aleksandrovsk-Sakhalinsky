<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<script src="https://cdn.tailwindcss.com"></script>
<title>極・ULTRA ENGINE Pro</title>
</head>

<body class="bg-gray-900 text-white">

<div class="max-w-md mx-auto p-4 space-y-3">

<select id="category" class="w-full p-2 text-black rounded">
<option value="country">国</option>
<option value="capital">首都</option>
</select>

<input id="ml" type="number" value="3" class="w-full p-2 text-black rounded mt-2">

<label><input type="checkbox" id="char_limit"> 文字重複禁止</label><br>
<label><input type="checkbox" id="rt"> 牛耕モード</label><br>
<label><input type="checkbox" id="exclude"> 共役排除</label><br>

<input id="ttl" type="number" placeholder="TTL" class="w-full p-2 text-black rounded mt-2">

<button onclick="run()" class="w-full bg-blue-500 p-3 rounded mt-3">
Explore
</button>

<div id="out" class="space-y-2 mt-3"></div>

</div>

<script>

function save(){
localStorage.setItem("category",category.value);
localStorage.setItem("ml",ml.value);
localStorage.setItem("char",char_limit.checked);
localStorage.setItem("rt",rt.checked);
localStorage.setItem("ex",exclude.checked);
localStorage.setItem("ttl",ttl.value);
}

function load(){
category.value=localStorage.getItem("category")||"country";
ml.value=localStorage.getItem("ml")||3;
char_limit.checked=localStorage.getItem("char")==="true";
rt.checked=localStorage.getItem("rt")==="true";
exclude.checked=localStorage.getItem("ex")==="true";
ttl.value=localStorage.getItem("ttl")||"";
}

async function run(){

save();

const res=await fetch("/search",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
category:category.value,
ml:+ml.value,
char_limit_mode:char_limit.checked,
rt:rt.checked,
exclude_conjugate:exclude.checked,
ttl:ttl.value?+ttl.value:null,
limit:50
})
});

const d=await res.json();

out.innerHTML="";

d.results.forEach(r=>{
const div=document.createElement("div");
div.className="bg-gray-700 p-2 rounded";
div.textContent=r.join(" → ");
out.appendChild(div);
});

}

load();

</script>

</body>
</html>
