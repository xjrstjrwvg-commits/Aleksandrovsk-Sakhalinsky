<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>極・ULTRA ENGINE Pro</title>
    <script src="https://tailwindcss.com"></script>
    <style>
        /* レイアウト安定化のための基本設定 */
        html, body { overflow-x: hidden; width: 100%; touch-action: pan-y; }
        .dark { color-scheme: dark; }
        
        /* ガラスデザインの定義 */
        .glass { 
            background-color: white; 
            border: 1px solid #e2e8f0; 
            border-radius: 28px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }
        .dark .glass { 
            background-color: #0f172a; 
            border-color: #1e293b; 
        }

        /* フォーム要素の統一 */
        input, select, textarea { 
            background-color: #f1f5f9; 
            padding: 12px; 
            border-radius: 12px; 
            font-size: 14px;
            font-weight: 700; 
            outline: none;
            border: 2px solid transparent;
            transition: all 0.2s;
        }
        input:focus { border-color: #3b82f6; }
        .dark input, .dark select, .dark textarea { 
            background-color: #1e293b; 
            color: #f1f5f9; 
        }

        .step-btn { @apply bg-slate-200 dark:bg-slate-700 w-9 h-9 flex items-center justify-center rounded-lg font-black active:scale-90 transition-all text-sm; }
        ::-webkit-scrollbar { display: none; }
        
        summary { list-style: none; cursor: pointer; }
        summary::-webkit-details-marker { display: none; }

        /* 詳細設定内の入力欄の調整 */
        details .input-group {
            @apply border-t border-slate-200 dark:border-slate-700 pt-4 mt-4;
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 p-3 pb-24" onchange="saveSettings()" oninput="saveSettings()">
    <div class="max-w-md mx-auto space-y-3">
        <header class="flex justify-between items-center py-1">
            <div class="flex items-center gap-3">
                <h1 class="text-xl font-black italic text-blue-600 uppercase tracking-tighter">Ultra Engine</h1>
                <button onclick="toggleDarkMode()" class="text-xl p-1 hover:scale-110 transition-transform">🌗</button>
            </div>
            <div class="flex gap-2">
                <button onclick="resetSettings()" class="bg-rose-100 dark:bg-rose-900/30 text-rose-600 px-4 py-2 rounded-full text-[10px] font-bold uppercase">Reset</button>
                <button onclick="copyAll()" class="bg-slate-200 dark:bg-slate-800 px-4 py-2 rounded-full text-[10px] font-bold uppercase">All Copy</button>
            </div>
        </header>

        <!-- メイン入力エリア -->
        <div class="glass p-5 space-y-4">
            <input id="sw" placeholder="開始単語" class="w-full">
            <div class="grid grid-cols-3 gap-2">
                <input id="sc" placeholder="開始字">
                <input id="mc" placeholder="必須字">
                <input id="ec" placeholder="終了字">
            </div>

            <!-- 詳細設定（餡式必須スイッチ含む） -->
            <details class="group border border-slate-200 dark:border-slate-700 rounded-2xl p-2 bg-slate-50/50 dark:bg-slate-800/20">
                <summary class="flex justify-center items-center py-3">
                    <span class="text-[11px] font-black text-blue-600 uppercase tracking-widest group-open:hidden">＋ 詳細設定を表示</span>
                    <span class="text-[11px] font-black text-rose-500 uppercase tracking-widest hidden group-open:block">－ 詳細設定を閉じる</span>
                </summary>
                
                <div class="space-y-5 px-1 pb-4">
                    <div class="grid grid-cols-2 gap-3 border-t border-slate-200 dark:border-slate-700 pt-4">
                        <div class="space-y-1">
                            <label class="text-[10px] font-bold text-blue-500 uppercase">全語開始字</label>
                            <input id="asc" placeholder="ア,カ">
                        </div>
                        <div class="space-y-1">
                            <label class="text-[10px] font-bold text-blue-500 uppercase">全語終了字</label>
                            <input id="aec" placeholder="ン,イ">
                        </div>
                    </div>

                    <div class="space-y-1 border-t border-slate-200 dark:border-slate-700 pt-4">
                        <label class="text-[10px] font-bold text-emerald-500 uppercase">使える文字リスト</label>
                        <input id="valid_chars" placeholder="アイウエオ">
                    </div>

                    <div class="grid grid-cols-2 gap-x-4 gap-y-3 text-[11px] font-bold border-t border-slate-200 dark:border-slate-700 pt-4">
                        <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" id="allow_daku" class="w-4 h-4"> 濁点OK</label>
                        <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" id="allow_handaku" class="w-4 h-4"> 半濁点OK</label>
                        <label class="flex items-center gap-2 cursor-pointer text-indigo-600"><input type="checkbox" id="auto_recovery" class="w-4 h-4"> 遡り接続</label>
                        <label class="flex items-center gap-2 cursor-pointer text-orange-600"><input type="checkbox" id="unify_small" class="w-4 h-4"> 大=小</label>
                        <label class="flex items-center gap-2 cursor-pointer text-blue-600"><input type="checkbox" id="rt" class="w-4 h-4"> 牛耕</label>
                        <label class="flex items-center gap-2 cursor-pointer text-rose-600"><input type="checkbox" id="char_limit_mode" class="w-4 h-4"> 重複禁止</label>
                        <label class="flex items-center gap-2 cursor-pointer text-amber-600 font-black"><input type="checkbox" id="ansiki_mode" class="w-4 h-4"> 餡式必須</label>
                    </div>
                </div>
            </details>

            <!-- 実行コントロール -->
            <div class="grid grid-cols-2 gap-4 border-t border-slate-100 dark:border-slate-800 pt-3">
                <div class="space-y-1">
                    <label class="text-[9px] font-bold text-slate-400 uppercase">単語数</label>
                    <div class="flex items-center gap-2">
                        <button type="button" onclick="adjustVal('ml',-1)" class="step-btn">-</button>
                        <input type="number" id="ml" value="5" class="w-10 text-center bg-transparent border-none">
                        <button type="button" onclick="adjustVal('ml',1)" class="step-btn">+</button>
                    </div>
                </div>
                <div class="flex items-center justify-end pt-4">
                    <button type="button" onclick="run()" id="btn" class="bg-blue-600 text-white font-black px-8 py-3.5 rounded-2xl shadow-lg active:scale-95 transition-all uppercase tracking-widest">Explore</button>
                </div>
            </div>

            <div class="flex items-center justify-between pt-2">
                <div class="flex gap-3 text-[11px] font-bold">
                    <label class="cursor-pointer text-blue-500"><input type="checkbox" name="cat" value="country" checked onchange="loadDictionaryUI()"> 国</label>
                    <label class="cursor-pointer text-blue-500"><input type="checkbox" name="cat" value="capital" onchange="loadDictionaryUI()"> 首都</label>
                </div>
            </div>
            <div id="stats" class="text-center text-[10px] font-bold text-blue-500 hidden uppercase py-1"></div>
        </div>

        <div id="res" class="space-y-3 pb-20"></div>
    </div>

    <!-- 辞書マネージャ（モーダル） -->
    <div id="dict-manager" class="hidden fixed inset-0 z-50 bg-white dark:bg-slate-950 p-5 overflow-y-auto">
        <button onclick="document.getElementById('dict-manager').classList.add('hidden')" class="mb-5 font-bold text-rose-500">CLOSE</button>
        <div id="dict-list" class="grid grid-cols-2 gap-1"></div>
    </div>
    <button onclick="document.getElementById('dict-manager').classList.remove('hidden')" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-6 py-3 rounded-full text-xs font-black uppercase tracking-widest opacity-90">Dictionary</button>

    <script>
        let currentRoutes = [];
        let wordStates = {};
        
        function toggleDarkMode() { document.documentElement.classList.toggle('dark'); saveSettings(); }

        async function init() {
            if (localStorage.ultraSettings) {
                const s = JSON.parse(localStorage.ultraSettings);
                ['sw','sc','asc','mc','ec','aec','ml','valid_chars'].forEach(f => { if(document.getElementById(f)) document.getElementById(f).value = s[f] || ""; });
                ['allow_daku','allow_handaku','char_limit_mode','auto_recovery','unify_small','rt','ansiki_mode'].forEach(f => { if(document.getElementById(f)) document.getElementById(f).checked = !!s[f]; });
                if (s.dark_mode) document.documentElement.classList.add('dark');
                wordStates = s.wordStates || {};
            }
            await loadDictionaryUI();
        }

        async function loadDictionaryUI() {
            const r = await fetch('/get_dictionary');
            const dict = await r.json();
            const cats = Array.from(document.querySelectorAll('input[name="cat"]:checked')).map(c => c.value);
            let words = [];
            cats.forEach(c => words = words.concat(dict[c] || []));
            words = Array.from(new Set(words)).sort();
            document.getElementById('dict-list').innerHTML = words.map(w => {
                const s = wordStates[w] || 'white';
                const style = s === 'red' ? "background:#f43f5e;color:white;" : s === 'blue' ? "background:#2563eb;color:white;" : "";
                return `<button onclick="toggleWordState(this, '${w}')" class="p-2 rounded-lg border text-[10px] font-bold" style="${style}">${w}</button>`;
            }).join('');
        }

        function toggleWordState(btn, word) {
            const states = { 'white': 'red', 'red': 'blue', 'blue': 'white' };
            wordStates[word] = states[wordStates[word] || 'white'];
            saveSettings();
            loadDictionaryUI(); 
        }

        function saveSettings() {
            localStorage.ultraSettings = JSON.stringify({
                sw: document.getElementById('sw').value, sc: document.getElementById('sc').value, asc: document.getElementById('asc').value,
                mc: document.getElementById('mc').value, ec: document.getElementById('ec').value, aec: document.getElementById('aec').value,
                ml: document.getElementById('ml').value, valid_chars: document.getElementById('valid_chars').value,
                ansiki_mode: document.getElementById('ansiki_mode').checked,
                allow_daku: document.getElementById('allow_daku').checked, allow_handaku: document.getElementById('allow_handaku').checked,
                char_limit_mode: document.getElementById('char_limit_mode').checked, auto_recovery: document.getElementById('auto_recovery').checked,
                unify_small: document.getElementById('unify_small').checked, rt: document.getElementById('rt').checked,
                dark_mode: document.documentElement.classList.contains('dark'), wordStates: wordStates
            });
        }

        function resetSettings() { localStorage.removeItem('ultraSettings'); location.reload(); }
        function adjustVal(id, delta) { const el = document.getElementById(id); el.value = Math.max(1, parseInt(el.value || 0) + delta); saveSettings(); }

        async function run() {
            const btn = document.getElementById('btn'); btn.innerText = "EXPLORING..."; btn.disabled = true;
            const body = {
                start_word: document.getElementById('sw').value, start_char: document.getElementById('sc').value,
                all_start_char: document.getElementById('asc').value, must_char: document.getElementById('mc').value,
                end_char: document.getElementById('ec').value, all_end_char: document.getElementById('aec').value,
                valid_chars: document.getElementById('valid_chars').value, max_len: document.getElementById('ml').value,
                ansiki_mode: document.getElementById('ansiki_mode').checked,
                allow_daku: document.getElementById('allow_daku').checked, allow_handaku: document.getElementById('allow_handaku').checked,
                auto_recovery: document.getElementById('auto_recovery').checked, char_limit_mode: document.getElementById('char_limit_mode').checked,
                unify_small: document.getElementById('unify_small').checked, round_trip: document.getElementById('rt').checked,
                categories: Array.from(document.querySelectorAll('input[name="cat"]:checked')).map(c => c.value),
                red_words: Object.keys(wordStates).filter(k => wordStates[k] === 'red'), blue_words: Object.keys(wordStates).filter(k => wordStates[k] === 'blue')
            };
            const r = await fetch('/search', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body) });
            const d = await r.json(); currentRoutes = d.routes || []; btn.innerText = "Explore"; btn.disabled = false; display();
        }

        function display() {
            document.getElementById('res').innerHTML = currentRoutes.map((rt, i) => `
                <div class="glass p-4 flex flex-col gap-2">
                    <div class="flex justify-between items-center text-[10px] font-black text-slate-400"><span>#${i+1}</span><button onclick="copyOne(${i})" class="text-blue-600">Copy</button></div>
                    <div class="font-bold text-sm">${rt.join(' → ')}</div>
                    <div class="text-[9px] font-black text-blue-500 uppercase">${rt.join('').length} letters</div>
                </div>`).join('');
            document.getElementById('stats').innerText = `${currentRoutes.length} ROUTES FOUND`;
            document.getElementById('stats').classList.remove('hidden');
        }

        function copyOne(i) { navigator.clipboard.writeText(currentRoutes[i].join(' → ')); }
        function copyAll() { navigator.clipboard.writeText(currentRoutes.map(rt => rt.join(' → ')).join('\n')); }
        window.onload = init;
    </script>
</body>
</html>
